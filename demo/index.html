<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐Mix - 纯前端版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            padding: 24px;
            position: relative;
        }
        
        .bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            animation: float 25s ease-in-out infinite;
        }
        
        .bg-orb:nth-child(1) {
            width: 500px; height: 500px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            top: -150px; left: -150px;
        }
        
        .bg-orb:nth-child(2) {
            width: 400px; height: 400px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            bottom: -100px; right: -100px;
            animation-delay: -8s;
        }
        
        .bg-orb:nth-child(3) {
            width: 350px; height: 350px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            top: 40%; left: 60%;
            animation-delay: -16s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -40px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
        }
        
        .main-container {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: minmax(280px, 1fr) minmax(280px, 1fr) minmax(280px, 1fr);
            gap: 24px;
            max-width: 1600px;
            margin: 0 auto;
            min-height: calc(100vh - 48px);
        }
        
        .card {
            background: rgba(30, 30, 50, 0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            min-width: 280px;
        }
        
        .card-header {
            font-size: 0.9rem;
            color: #fff;
            margin-bottom: 20px;
            font-weight: 600;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .upload-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            min-height: 360px;
        }
        
        .upload-group { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }
        
        .upload-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            font-weight: 500;
        }
        
        .upload-item {
            height: 140px;
            min-height: 140px;
            background: rgba(0,0,0,0.25);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            gap: 6px;
            padding: 16px;
        }
        
        .upload-item:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        
        .upload-item.empty .upload-icon { font-size: 1.8rem; opacity: 0.5; }
        .upload-item.empty .upload-name { color: rgba(255,255,255,0.4); font-size: 0.8rem; }
        .upload-item.empty .upload-hint { font-size: 0.65rem; color: rgba(255,255,255,0.25); }
        
        .upload-item.has-file {
            border-style: solid;
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.12);
        }
        
        .upload-item.has-file .upload-icon { font-size: 1.5rem; }
        .upload-item.has-file .upload-name {
            color: #a5b4fc;
            font-size: 0.85rem;
            font-weight: 500;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .upload-item.has-file .upload-hint { display: none; }
        .upload-item.has-file .upload-status {
            display: flex;
            font-size: 0.7rem;
            color: #34d399;
        }
        .upload-status { display: none; }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: auto;
        }
        
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        
        .strategy-section { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        
        .eval-area {
            background: rgba(0,0,0,0.2);
            border-radius: 14px;
            padding: 20px;
            min-height: 180px;
        }
        
        .eval-title {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        
        .eval-placeholder {
            text-align: center;
            padding: 40px 16px;
            color: rgba(255,255,255,0.4);
        }
        
        .eval-placeholder-icon { font-size: 2rem; margin-bottom: 12px; opacity: 0.6; }
        
        .eval-result { text-align: center; }
        
        .eval-score-wrapper {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 4px;
            margin-bottom: 8px;
        }
        
        .eval-score { font-size: 3rem; font-weight: 700; line-height: 1; }
        .eval-score-label { font-size: 0.9rem; color: rgba(255,255,255,0.5); }
        
        .eval-score.excellent { color: #34d399; }
        .eval-score.good { color: #60a5fa; }
        .eval-score.fair { color: #fbbf24; }
        .eval-score.poor { color: #f87171; }
        
        .eval-verdict {
            font-size: 0.85rem;
            margin-bottom: 12px;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
        }
        
        .eval-verdict.excellent { color: #34d399; background: rgba(52, 211, 153, 0.12); }
        .eval-verdict.good { color: #60a5fa; background: rgba(96, 165, 250, 0.12); }
        .eval-verdict.fair { color: #fbbf24; background: rgba(251, 191, 36, 0.12); }
        .eval-verdict.poor { color: #f87171; background: rgba(248, 113, 113, 0.12); }
        
        .eval-details {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.45);
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        
        .eval-details span { color: rgba(255,255,255,0.7); }
        
        .eval-recommend {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            padding: 10px 14px;
            background: rgba(102, 126, 234, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(102, 126, 234, 0.15);
        }
        
        .eval-recommend span { color: #a5b4fc; font-weight: 500; }
        
        .strategy-area { flex: 1; display: flex; flex-direction: column; }
        
        .strategy-title {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        .strategy-grid { display: flex; flex-direction: column; gap: 10px; flex: 1; }
        
        .strategy-btn {
            padding: 14px 16px;
            background: rgba(0,0,0,0.2);
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .strategy-btn:hover:not(.disabled) {
            background: rgba(255,255,255,0.04);
            border-color: rgba(102, 126, 234, 0.3);
        }
        
        .strategy-btn.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.12);
        }
        
        .strategy-btn.disabled { opacity: 0.35; cursor: not-allowed; }
        
        .strategy-icon { font-size: 1.4rem; width: 36px; text-align: center; }
        .strategy-info { flex: 1; }
        .strategy-name { font-size: 0.9rem; font-weight: 600; color: #fff; margin-bottom: 2px; }
        .strategy-desc { font-size: 0.7rem; color: rgba(255,255,255,0.45); }
        
        .result-section { flex: 1; display: flex; flex-direction: column; }
        
        .result-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
            color: rgba(255,255,255,0.4);
        }
        
        .result-placeholder-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
        .result-placeholder-text { font-size: 0.95rem; margin-bottom: 8px; }
        .result-placeholder-hint { font-size: 0.8rem; color: rgba(255,255,255,0.3); }
        
        .result-content { display: none; flex-direction: column; flex: 1; }
        .result-content.show { display: flex; }
        
        .result-card {
            background: rgba(0,0,0,0.2);
            border-radius: 14px;
            padding: 16px;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .result-header .highlight { color: #a5b4fc; font-weight: 500; }
        
        .result-info {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 16px;
        }
        
        .wave-container {
            background: rgba(0,0,0,0.25);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 16px;
        }
        
        .wave-label {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 8px;
        }
        
        #waveMix {
            width: 100%;
            height: 60px;
            border-radius: 6px;
            display: block;
        }
        
        .audio-player {
            width: 100%;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            height: 40px;
        }
        
        .loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 32px;
            border-radius: 12px;
            font-size: 0.9rem;
            z-index: 1000;
            display: none;
            background: rgba(30, 30, 50, 0.95);
            color: #a5b4fc;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }
        
        .error {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 32px;
            border-radius: 12px;
            font-size: 0.9rem;
            z-index: 1000;
            display: none;
            background: rgba(127, 29, 29, 0.95);
            color: #fca5a5;
            border: 1px solid rgba(248, 113, 113, 0.3);
            max-width: 300px;
            text-align: center;
        }
        
        @media (max-width: 1200px) {
            .main-container { grid-template-columns: 1fr 1fr; gap: 16px; }
            body { padding: 16px; }
        }
        
        @media (max-width: 800px) {
            .main-container { grid-template-columns: 1fr; gap: 12px; overflow-y: auto; }
            body { padding: 12px; overflow: auto; min-height: 100vh; }
            .card { min-height: auto; max-height: none; }
        }
    </style>
</head>
<body>
    <div class="bg-container">
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
    </div>
    
    <div class="main-container">
        <div class="card">
            <div class="card-header">导入歌曲</div>
            <div class="upload-section">
                <div class="upload-group">
                    <label class="upload-label">歌曲 A（前一首）</label>
                    <div class="upload-item empty" id="uploadA" onclick="document.getElementById('fileA').click()">
                        <input type="file" id="fileA" accept="audio/*" style="display: none;">
                        <div class="upload-icon">🎵</div>
                        <div class="upload-name" id="nameA">点击选择歌曲</div>
                        <div class="upload-hint">支持 MP3 / WAV / M4A</div>
                        <div class="upload-status">✓ 已就绪</div>
                    </div>
                </div>
                
                <div class="upload-group">
                    <label class="upload-label">歌曲 B（后一首）</label>
                    <div class="upload-item empty" id="uploadB" onclick="document.getElementById('fileB').click()">
                        <input type="file" id="fileB" accept="audio/*" style="display: none;">
                        <div class="upload-icon">🎵</div>
                        <div class="upload-name" id="nameB">点击选择歌曲</div>
                        <div class="upload-hint">支持 MP3 / WAV / M4A</div>
                        <div class="upload-status">✓ 已就绪</div>
                    </div>
                </div>
                
                <button class="btn" id="confirmBtn" onclick="analyzeTracks()" disabled>开始评估</button>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">混音策略</div>
            <div class="strategy-section">
                <div class="eval-area">
                    <div class="eval-title">兼容性评估</div>
                    <div class="eval-placeholder" id="evalPlaceholder">
                        <div class="eval-placeholder-icon">📊</div>
                        <div>请先上传两首歌曲</div>
                    </div>
                    <div class="eval-result" id="evalResult" style="display: none;">
                        <div class="eval-score-wrapper">
                            <div class="eval-score" id="evalScore">-</div>
                            <div class="eval-score-label">分</div>
                        </div>
                        <div class="eval-verdict" id="evalVerdict">-</div>
                        <div class="eval-details" id="evalDetails">
                            <span>BPM: -</span>
                            <span>调性: -</span>
                            <span>节奏: -</span>
                        </div>
                        <div class="eval-recommend" id="evalRecommend">推荐策略: <span>-</span></div>
                    </div>
                </div>
                
                <div class="strategy-area">
                    <div class="strategy-title">选择策略</div>
                    <div class="strategy-grid">
                        <div class="strategy-btn disabled" data-strategy="crossfade" onclick="selectStrategy('crossfade')">
                            <div class="strategy-icon">🌊</div>
                            <div class="strategy-info">
                                <div class="strategy-name">Crossfade</div>
                                <div class="strategy-desc">简单淡入淡出，稳定可靠</div>
                            </div>
                        </div>
                        <div class="strategy-btn disabled" data-strategy="beat_sync" onclick="selectStrategy('beat_sync')">
                            <div class="strategy-icon">🥁</div>
                            <div class="strategy-info">
                                <div class="strategy-name">Beat-sync</div>
                                <div class="strategy-desc">节拍对齐，节奏更协调</div>
                            </div>
                        </div>
                        <div class="strategy-btn disabled" data-strategy="echo_fade" onclick="selectStrategy('echo_fade')">
                            <div class="strategy-icon">🔊</div>
                            <div class="strategy-info">
                                <div class="strategy-name">Echo</div>
                                <div class="strategy-desc">回声效果，过渡更自然</div>
                            </div>
                        </div>
                        <div class="strategy-btn disabled" data-strategy="harmonic" onclick="selectStrategy('harmonic')">
                            <div class="strategy-icon">🎹</div>
                            <div class="strategy-info">
                                <div class="strategy-name">Harmonic</div>
                                <div class="strategy-desc">调性匹配，和声和谐时效果最佳</div>
                            </div>
                        </div>
                    </div>
                    <button class="btn" id="genBtn" onclick="generateMix()" disabled>生成混音</button>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">混音结果</div>
            <div class="result-section">
                <div class="result-placeholder" id="resultPlaceholder">
                    <div class="result-placeholder-icon">🎧</div>
                    <div class="result-placeholder-text">暂未生成混音效果</div>
                    <div class="result-placeholder-hint">请先上传歌曲并选择策略</div>
                </div>
                
                <div class="result-content" id="resultContent">
                    <div class="result-card">
                        <div class="result-header">
                            <div>策略: <span class="highlight" id="resStrategy">-</span></div>
                            <div>时长: <span class="highlight" id="resDuration">-</span></div>
                        </div>
                        <div class="result-info">过渡点: <span id="resTransition">-</span> 秒</div>
                        <div class="wave-container">
                            <div class="wave-label">波形预览（红色为过渡区域）</div>
                            <canvas id="waveMix"></canvas>
                        </div>
                        <audio id="player" controls class="audio-player"></audio>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="loading" id="loading">处理中...</div>
    <div class="error" id="error" style="display:none;"></div>
    
    <script>
        // 配置后端 API 地址（Render 部署的地址）
        const API_BASE = 'https://ai-mix.onrender.com';
        
        let audioA = null, audioB = null;
        let bufferA = null, bufferB = null;
        let infoA = null, infoB = null;
        let currentStrategy = 'crossfade';
        let audioContext = null;
        
        function getContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioContext;
        }
        
        document.getElementById('fileA').addEventListener('change', async e => {
            if (e.target.files[0]) {
                audioA = e.target.files[0];
                document.getElementById('uploadA').classList.remove('empty');
                document.getElementById('uploadA').classList.add('has-file');
                document.getElementById('nameA').textContent = audioA.name;
                checkCanConfirm();
            }
        });
        
        document.getElementById('fileB').addEventListener('change', async e => {
            if (e.target.files[0]) {
                audioB = e.target.files[0];
                document.getElementById('uploadB').classList.remove('empty');
                document.getElementById('uploadB').classList.add('has-file');
                document.getElementById('nameB').textContent = audioB.name;
                checkCanConfirm();
            }
        });
        
        async function analyzeAudio(buffer, ctx) {
            const channelData = buffer.getChannelData(0);
            const sampleRate = buffer.sampleRate;
            
            // BPM 检测 (简化版)
            const bpm = await detectBPM(channelData, sampleRate);
            
            // 能量分析
            const energy = analyzeEnergy(channelData);
            
            // 频谱特征 (用于调性检测简化)
            const spectral = analyzeSpectral(channelData, ctx);
            
            return { bpm, energy, spectral, duration: buffer.duration };
        }
        
        async function detectBPM(audioData, sampleRate) {
            // 简化的 BPM 检测算法
            const bufferSize = 2048;
            const hopSize = 512;
            const peaks = [];
            
            // 计算能量包络
            for (let i = 0; i < audioData.length - bufferSize; i += hopSize) {
                let energy = 0;
                for (let j = 0; j < bufferSize; j++) {
                    energy += audioData[i + j] * audioData[i + j];
                }
                peaks.push(energy / bufferSize);
            }
            
            // 自相关找周期
            const minBPM = 60, maxBPM = 180;
            const minInterval = Math.floor(sampleRate * 60 / maxBPM / hopSize);
            const maxInterval = Math.floor(sampleRate * 60 / minBPM / hopSize);
            
            let bestCorr = 0, bestInterval = minInterval;
            
            for (let interval = minInterval; interval < maxInterval && interval < peaks.length; interval++) {
                let corr = 0;
                for (let i = 0; i < peaks.length - interval; i++) {
                    corr += peaks[i] * peaks[i + interval];
                }
                if (corr > bestCorr) {
                    bestCorr = corr;
                    bestInterval = interval;
                }
            }
            
            let bpm = (60 * sampleRate) / (bestInterval * hopSize);
            
            // 归一化到合理范围
            while (bpm > 160) bpm /= 2;
            while (bpm < 70) bpm *= 2;
            
            return Math.round(bpm);
        }
        
        function analyzeEnergy(audioData) {
            let sum = 0;
            for (let i = 0; i < audioData.length; i++) {
                sum += Math.abs(audioData[i]);
            }
            return sum / audioData.length;
        }
        
        function analyzeSpectral(audioData, ctx) {
            // 简化的频谱分析
            const fftSize = 4096;
            const analyser = ctx.createAnalyser();
            analyser.fftSize = fftSize;
            
            // 返回简单的低/中/高频能量比
            return { low: 0.3, mid: 0.4, high: 0.3 };
        }
        
        function checkCanConfirm() {
            const nameA = audioA ? audioA.name.toLowerCase() : '';
            const nameB = audioB ? audioB.name.toLowerCase() : '';
            
            if (nameA === nameB && nameA !== '') {
                showError('⚠️ 检测到相同的歌曲');
                document.getElementById('confirmBtn').disabled = true;
                return;
            }
            
            document.getElementById('confirmBtn').disabled = !(audioA && audioB);
        }
        
        function showLoading(msg) {
            document.getElementById('loading').textContent = msg;
            document.getElementById('loading').style.display = 'block';
        }
        
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }
        
        function showError(msg) {
            document.getElementById('error').textContent = msg;
            document.getElementById('error').style.display = 'block';
        }
        
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
        
        async function analyzeTracks() {
            hideError();
            showLoading('正在评估兼容性...');
            
            try {
                const form = new FormData();
                form.append('track_a', audioA);
                form.append('track_b', audioB);
                
                const res = await fetch(API_BASE + '/api/evaluate', {
                    method: 'POST',
                    body: form
                });
                
                if (!res.ok) {
                    throw new Error(`评估失败: ${res.status}`);
                }
                
                const data = await res.json();
                
                if (!data.success) {
                    throw new Error(data.error || '评估失败');
                }
                
                const score = data.score;
                
                document.getElementById('evalPlaceholder').style.display = 'none';
                document.getElementById('evalResult').style.display = 'block';
                
                const scoreEl = document.getElementById('evalScore');
                scoreEl.textContent = score;
                
                const verdictEl = document.getElementById('evalVerdict');
                if (score >= 90) {
                    scoreEl.className = 'eval-score excellent';
                    verdictEl.textContent = '优秀 - 非常适合混音';
                    verdictEl.className = 'eval-verdict excellent';
                } else if (score >= 75) {
                    scoreEl.className = 'eval-score good';
                    verdictEl.textContent = '良好 - 适合尝试混音';
                    verdictEl.className = 'eval-verdict good';
                } else if (score >= 60) {
                    scoreEl.className = 'eval-score fair';
                    verdictEl.textContent = '一般 - 混音效果可能平平';
                    verdictEl.className = 'eval-verdict fair';
                } else {
                    scoreEl.className = 'eval-score poor';
                    verdictEl.textContent = '较差 - 建议更换歌曲';
                    verdictEl.className = 'eval-verdict poor';
                }
                
                document.getElementById('evalDetails').innerHTML = 
                    `<span>BPM: ${data.bpm_score || '-'}</span><span>调性: ${data.key_score || '-'}</span><span>节奏: ${data.beat_score || '-'}</span>`;
                
                document.getElementById('evalRecommend').innerHTML = `推荐策略: <span>${data.recommendation_name || data.recommendation}</span>`;
                
                document.querySelectorAll('.strategy-btn').forEach(btn => btn.classList.remove('disabled'));
                document.getElementById('genBtn').disabled = false;
                
                window.evaluationData = data;
                selectStrategy(data.recommendation);
                
            } catch (err) {
                showError('评估失败: ' + err.message);
                console.error(err);
            } finally {
                hideLoading();
            }
        }
        
        function selectStrategy(strategy) {
            const btn = document.querySelector(`[data-strategy="${strategy}"]`);
            if (btn.classList.contains('disabled')) return;
            
            document.querySelectorAll('.strategy-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentStrategy = strategy;
        }
        
        async function generateMix() {
            showLoading('生成混音中，请稍候...');
            hideError();
            
            try {
                const form = new FormData();
                form.append('track_a', audioA);
                form.append('track_b', audioB);
                form.append('strategy', currentStrategy);
                
                const res = await fetch(API_BASE + '/api/mix', {
                    method: 'POST',
                    body: form
                });
                
                if (!res.ok) {
                    throw new Error(`生成失败: ${res.status}`);
                }
                
                const data = await res.json();
                
                if (!data.success) {
                    throw new Error(data.error || '生成失败');
                }
                
                const outputUrl = API_BASE + data.output_url;
                
                // 绘制波形
                await drawWaveFromUrl(outputUrl, data.transition_point, data.duration);
                
                // 更新UI
                const names = { 
                    crossfade: 'Crossfade', 
                    beat_sync: 'Beat-sync', 
                    echo_fade: 'Echo',
                    harmonic: 'Harmonic'
                };
                document.getElementById('resStrategy').textContent = names[data.strategy] || data.strategy;
                document.getElementById('resDuration').textContent = fmtTime(data.duration);
                document.getElementById('resTransition').textContent = fmtTime(data.transition_point);
                
                document.getElementById('resultPlaceholder').style.display = 'none';
                document.getElementById('resultContent').classList.add('show');
                document.getElementById('player').src = outputUrl;
                document.getElementById('player').play();
                
                hideLoading();
                
            } catch (err) {
                hideLoading();
                showError('混音生成失败: ' + err.message);
                console.error(err);
            }
        }
        
        function bufferToWav(buffer) {
            const numChannels = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const format = 1; // PCM
            const bitDepth = 16;
            
            const bytesPerSample = bitDepth / 8;
            const blockAlign = numChannels * bytesPerSample;
            
            const dataLength = buffer.length * blockAlign;
            const bufferLength = 44 + dataLength;
            
            const arrayBuffer = new ArrayBuffer(bufferLength);
            const view = new DataView(arrayBuffer);
            
            // WAV header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, bufferLength - 8, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * blockAlign, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitDepth, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataLength, true);
            
            // Write samples
            const channelData = [];
            for (let i = 0; i < numChannels; i++) {
                channelData.push(buffer.getChannelData(i));
            }
            
            let offset = 44;
            for (let i = 0; i < buffer.length; i++) {
                for (let ch = 0; ch < numChannels; ch++) {
                    const sample = Math.max(-1, Math.min(1, channelData[ch][i]));
                    const intSample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                    view.setInt16(offset, intSample, true);
                    offset += 2;
                }
            }
            
            return new Blob([arrayBuffer], { type: 'audio/wav' });
        }
        
        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }
        
        async function drawWaveFromUrl(url, transition, duration) {
            const canvas = document.getElementById('waveMix');
            const ctx = canvas.getContext('2d');
            
            const container = canvas.parentElement;
            const containerWidth = container.clientWidth - 24;
            canvas.width = containerWidth * 2;
            canvas.height = 120;
            canvas.style.width = containerWidth + 'px';
            canvas.style.height = '60px';
            
            const resp = await fetch(url);
            const ab = await resp.arrayBuffer();
            const audioData = await new AudioContext().decodeAudioData(ab);
            
            const w = canvas.width;
            const h = canvas.height;
            const channelData = audioData.getChannelData(0);
            const samplesPerPixel = Math.max(1, Math.floor(channelData.length / w));
            
            const transX = Math.floor((transition / duration) * w);
            const fadeWidth = Math.floor(w * 0.12);
            const fadeStart = Math.max(0, transX - fadeWidth / 2);
            const fadeEnd = Math.min(w, transX + fadeWidth / 2);
            
            ctx.fillStyle = '#0a0a14';
            ctx.fillRect(0, 0, w, h);
            
            function lerpColor(c1, c2, t) {
                const r = Math.round(c1[0] + (c2[0] - c1[0]) * t);
                const g = Math.round(c1[1] + (c2[1] - c1[1]) * t);
                const b = Math.round(c1[2] + (c2[2] - c1[2]) * t);
                return `rgb(${r},${g},${b})`;
            }
            
            const colorA = [248, 113, 113];
            const colorMix = [192, 132, 252];
            const colorB = [96, 165, 250];
            
            for (let i = 0; i < w; i++) {
                let min = 1, max = -1;
                const startIdx = i * samplesPerPixel;
                for (let j = 0; j < samplesPerPixel && startIdx + j < channelData.length; j++) {
                    const d = channelData[startIdx + j];
                    if (d < min) min = d;
                    if (d > max) max = d;
                }
                
                const barHeight = Math.max(1, (max - min) * h / 2);
                const y = (1 + min) * h / 2;
                
                let color;
                if (i < fadeStart) {
                    color = lerpColor(colorA, [248, 180, 113], i / fadeStart * 0.3);
                } else if (i < fadeEnd) {
                    const t = (i - fadeStart) / (fadeEnd - fadeStart);
                    if (t < 0.5) {
                        color = lerpColor(colorA, colorMix, t * 2);
                    } else {
                        color = lerpColor(colorMix, colorB, (t - 0.5) * 2);
                    }
                } else {
                    const progress = (i - fadeEnd) / (w - fadeEnd);
                    color = lerpColor(colorB, [56, 189, 248], progress * 0.3);
                }
                
                ctx.fillStyle = color;
                ctx.fillRect(i, y, 1, barHeight);
            }
            
            const glowGrad = ctx.createLinearGradient(fadeStart, 0, fadeEnd, 0);
            glowGrad.addColorStop(0, 'rgba(192, 132, 252, 0)');
            glowGrad.addColorStop(0.5, 'rgba(192, 132, 252, 0.2)');
            glowGrad.addColorStop(1, 'rgba(192, 132, 252, 0)');
            ctx.fillStyle = glowGrad;
            ctx.fillRect(fadeStart, 0, fadeEnd - fadeStart, h);
        }

        function fmtTime(s) {

            const sec = Math.floor(s % 60);
            return m + ':' + String(sec).padStart(2, '0');
